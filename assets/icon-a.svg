<?xml version="1.0" encoding="UTF-8"?>
<!--
  RusTerm icon - Direction A: "Shield + $_ + motion trail"

  A dominant shield (security) contains a "$_" terminal prompt;
  a single bright trail streaks through the shield (speed).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RusTerm">
  <title>RusTerm</title>
  <desc>Shield with terminal prompt and motion trail.</desc>

  <defs>
    <clipPath id="sqA" clipPathUnits="userSpaceOnUse">
      <path d="M96 32 H416 A64 64 0 0 1 480 96 V416 A64 64 0 0 1 416 480 H96 A64 64 0 0 1 32 416 V96 A64 64 0 0 1 96 32 Z"/>
    </clipPath>
    <radialGradient id="bgA" cx="40%" cy="32%" r="85%">
      <stop offset="0%"  stop-color="#2A2A30"/>
      <stop offset="100%" stop-color="#0E0E12"/>
    </radialGradient>
    <linearGradient id="shieldA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F26A4F"/>
      <stop offset="60%" stop-color="#CE422B"/>
      <stop offset="100%" stop-color="#7A1F0F"/>
    </linearGradient>
    <linearGradient id="trailA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="70%" stop-color="#FFE9B0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glowA" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- base -->
  <g clip-path="url(#sqA)">
    <rect width="512" height="512" fill="url(#bgA)"/>
  </g>

  <!-- shield -->
  <path d="M256 80 L392 132 V272 C392 360 332 424 256 448 C180 424 120 360 120 272 V132 Z"
        fill="url(#shieldA)" stroke="#1B1B1F" stroke-opacity="0.55" stroke-width="6" stroke-linejoin="round"/>
  <path d="M256 92 L380 139 V272 C380 352 326 412 256 434 C186 412 132 352 132 272 V139 Z"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3" stroke-linejoin="round"/>

  <!-- "$_" prompt, centered in shield -->
  <g font-family="ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace"
     text-rendering="geometricPrecision" fill="#1B1B1F" fill-opacity="0.88">
    <text x="200" y="300" font-size="120" font-weight="700" text-anchor="middle">$</text>
    <rect x="252" y="240" width="14" height="70" fill="#1B1B1F" fill-opacity="0.88"/>
  </g>

  <!-- motion trail streaking through shield, lower-right exit -->
  <g filter="url(#glowA)" opacity="0.85">
    <path d="M150 350 L390 270" stroke="url(#trailA)" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>
  <circle cx="394" cy="268" r="9" fill="#FFFFFF"/>

  <!-- squircle edge -->
  <path d="M96 32 H416 A64 64 0 0 1 480 96 V416 A64 64 0 0 1 416 480 H96 A64 64 0 0 1 32 416 V96 A64 64 0 0 1 96 32 Z"
        fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="2"/>
</svg>
