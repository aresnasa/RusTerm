<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Squircle clip (family standard) -->
    <clipPath id="sqB">
      <path d="M96 32 H416 A64 64 0 0 1 480 96 V416 A64 64 0 0 1 416 480 H96 A64 64 0 0 1 32 416 V96 A64 64 0 0 1 96 32 Z"/>
    </clipPath>

    <!-- Dark base radial -->
    <radialGradient id="bgB" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#2A2A30"/>
      <stop offset="100%" stop-color="#0E0E12"/>
    </radialGradient>

    <!-- Orange Ferris-shell gradient -->
    <linearGradient id="orangeB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F26A4F"/>
      <stop offset="100%" stop-color="#CE422B"/>
    </linearGradient>

    <!-- Inner body highlight -->
    <linearGradient id="hiB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft glow filter for keyhole -->
    <filter id="glowB" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background squircle -->
  <g clip-path="url(#sqB)">
    <rect width="512" height="512" fill="url(#bgB)"/>
  </g>

  <!-- Corner bolts (family signature) -->
  <g fill="#FFD37A" opacity="0.45">
    <circle cx="80" cy="80" r="4"/>
    <circle cx="432" cy="80" r="4"/>
    <circle cx="80" cy="432" r="4"/>
    <circle cx="432" cy="432" r="4"/>
  </g>

  <!-- Lock shackle (U-shape above body, dark rust) -->
  <path d="M208 248 V184 A48 48 0 0 1 304 184 V248"
        fill="none" stroke="#7A1F0F" stroke-width="24" stroke-linecap="round"/>

  <!-- Shackle inner highlight -->
  <path d="M214 248 V186 A42 42 0 0 1 298 186 V248"
        fill="none" stroke="#F26A4F" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Eye-stalks (Ferris cue) — flank the shackle, emerge from top of body -->
  <g stroke="#7A1F0F" stroke-width="10" stroke-linecap="round">
    <line x1="176" y1="244" x2="176" y2="198"/>
    <line x1="336" y1="244" x2="336" y2="198"/>
  </g>
  <!-- Eye sclera -->
  <circle cx="176" cy="188" r="16" fill="#FFFFFF"/>
  <circle cx="336" cy="188" r="16" fill="#FFFFFF"/>
  <!-- Pupils (looking inward — gives Ferris character) -->
  <circle cx="184" cy="190" r="7" fill="#1B1B1F"/>
  <circle cx="328" cy="190" r="7" fill="#1B1B1F"/>
  <!-- Eye highlights -->
  <circle cx="181" cy="186" r="2.5" fill="#FFFFFF"/>
  <circle cx="325" cy="186" r="2.5" fill="#FFFFFF"/>

  <!-- Lock body (Ferris shell = orange rounded square) -->
  <rect x="136" y="240" width="240" height="160" rx="32" ry="32"
        fill="url(#orangeB)" stroke="#7A1F0F" stroke-width="4"/>

  <!-- Body top highlight -->
  <rect x="144" y="248" width="224" height="60" rx="24" ry="24" fill="url(#hiB)"/>

  <!-- Body bottom shadow -->
  <ellipse cx="256" cy="396" rx="100" ry="6" fill="#7A1F0F" opacity="0.4"/>

  <!-- Keyhole as > cursor (cut-out feel via dark fill) -->
  <!-- Glow underlay -->
  <path d="M216 282 L296 320 L216 358"
        fill="none" stroke="#FFD37A" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glowB)" opacity="0.5"/>
  <!-- Dark keyhole shape -->
  <path d="M216 282 L296 320 L216 358"
        fill="none" stroke="#0E0E12" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor underline -->
  <line x1="216" y1="372" x2="256" y2="372"
        stroke="#0E0E12" stroke-width="14" stroke-linecap="round"/>
</svg>
