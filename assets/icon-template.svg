<?xml version="1.0" encoding="UTF-8"?>
<!--
  RusTerm macOS menu-bar template icon.

  Per Apple Human Interface Guidelines, menu-bar template icons are
  PURE BLACK with alpha — the system composites them against the
  menu bar and applies the appropriate foreground color (light text
  on dark bar, dark text on light bar). Do NOT use gradients, colors,
  or antialiasing-dependent shading here.

  Design intent (must read at 16×16):
    - A bold ">" terminal cursor chevron — the universal "command /
      run / forward" cue — paired with a short underline "_" so the
      glyph reads as a prompt `> _` even at tiny sizes.
    - The chevron's open side faces right, echoing the primary
      app icon's "comet cursor" speed motif.
    - A simplified shield outline surrounds the glyph, conveying
      the "local security" pillar without needing the corner bolts
      or rivets from the full-color icon (they'd mush at 16×16).
    - Pure black (#000000) on transparent background. The system
      will invert / tint as needed.

  Pure SVG, no external deps. Square viewBox 0 0 512 512.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-label="RusTerm menu bar icon">
  <title>RusTerm</title>
  <desc>Template menu-bar icon: shield + terminal prompt cursor.</desc>

  <!--
    Shield outline: a rounded-top, pointed-bottom silhouette.
    Drawn as a single filled path so the interior is transparent
    (the system shows the bar through it). Stroke-only would
    disappear at 16×16; a filled silhouette with a cutout reads
    cleanly.
  -->
  <!-- Shield body (filled black) -->
  <path d="
    M 256 64
    L 416 128
    L 416 272
    C 416 376  344 456  256 480
    C 168 456  96 376  96 272
    L 96 128
    Z"
    fill="#000000"/>

  <!--
    Cut out the shield interior with a slightly inset path so we're
    left with a clean ring. Using even-odd fill rule on a single
    compound path keeps the SVG simple and renders identically in
    sips / iconutil / system bar.
  -->
  <path d="
    M 256 84
    L 396 144
    L 396 272
    C 396 364  332 436  256 458
    C 180 436  116 364  116 272
    L 116 144
    Z"
    fill="#000000"
    fill-rule="evenodd"
    opacity="0"/>

  <!--
    The interior above is a no-op (opacity 0) — kept as a comment
    marker. Actual interior transparency comes from the next step:
    we draw the prompt glyph in solid black ON TOP of the shield.
    To make the shield a clean ring, we instead use a mask.
  -->

  <!--
    Mask: white = visible (black paint), black = transparent.
    Shield ring = white ring; interior = black (cut out); glyph
    inside = white (visible).
  -->
  <defs>
    <mask id="ringAndGlyph" maskUnits="userSpaceOnUse"
          x="0" y="0" width="512" height="512">
      <!-- Black background = fully transparent -->
      <rect x="0" y="0" width="512" height="512" fill="#000000"/>

      <!-- Shield outer (white = visible) -->
      <path d="
        M 256 64
        L 416 128
        L 416 272
        C 416 376  344 456  256 480
        C 168 456  96 376  96 272
        L 96 128
        Z"
        fill="#FFFFFF"/>

      <!-- Shield inner (black = cut a hole, making a ring) -->
      <path d="
        M 256 88
        L 392 145
        L 392 272
        C 392 360  332 430  256 452
        C 180 430  120 360  120 272
        L 120 145
        Z"
        fill="#000000"/>

      <!--
        Terminal prompt glyph "> _":
        Solid white so it shows through as black on the bar.

        The ">" chevron is drawn as a filled triangle (not a stroke)
        so it stays legible at 16×16 — strokes thin out and vanish.
        The "_" underline is a filled rectangle for the same reason.
      -->
      <!-- Chevron ">" (pointing right) -->
      <path d="
        M 168 200
        L 248 256
        L 168 312
        L 168 280
        L 208 256
        L 168 232
        Z"
        fill="#FFFFFF"/>

      <!-- Underline "_" (prompt caret) -->
      <rect x="272" y="296" width="80" height="20" fill="#FFFFFF"/>
    </mask>
  </defs>

  <!--
    Apply the mask to a full-black rect. The result:
    - Shield ring (visible black)
    - Interior transparent
    - ">" + "_" visible black inside the shield
  -->
  <rect x="0" y="0" width="512" height="512" fill="#000000"
        mask="url(#ringAndGlyph)"/>
</svg>
